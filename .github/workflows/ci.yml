name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  headless-tests:
    name: Headless render tests (lavapipe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The very same entry point developers run locally: build the pinned Mesa
      # lavapipe + slang image and run the tests inside it. One code path, so CI
      # and local runs can't drift apart.
      - name: Build image and run headless tests
        run: ./test.sh

      # On failure the harness writes <name>_actual.png / <name>_diff.png next to
      # the binaries; surface them so a golden mismatch is inspectable.
      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: render-diffs
          path: |
            build-ci/bin/*_actual.png
            build-ci/bin/*_diff.png
          if-no-files-found: ignore
